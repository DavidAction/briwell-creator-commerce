services:
  - type: web
    name: briwell-api
    runtime: python
    plan: starter
    region: virginia
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/verify_production_readiness.py --env-file .env.production && python scripts/bootstrap_db.py --with-seeds --with-keywords --verify
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: Briwell Influencer Intelligence
      - key: USE_DATABASE
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MANAGED_SECRET_PROVIDER
        value: render_environment
      - key: AUTH_PROVIDER
        value: oidc
      - key: OIDC_ISSUER_URL
        sync: false
      - key: OIDC_AUDIENCE
        value: authenticated
      - key: OIDC_JWKS_URL
        sync: false
      - key: OIDC_ROLE_CLAIM
        value: app_metadata.briwell_role
      - key: OIDC_EMAIL_CLAIM
        value: email
      - key: OIDC_ALLOWED_ALGORITHMS
        value: ES256,RS256
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: AI_DRY_RUN
        value: "false"
      - key: ALLOW_LIVE_PROVIDER_CALLS
        value: "true"
      - key: APIFY_API_TOKEN
        sync: false
      - key: APIFY_TIKTOK_ACTOR_ID
        value: clockworks/tiktok-scraper
      - key: DATA365_API_KEY
        sync: false
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: TIKAPI_API_KEY
        sync: false
      - key: TIKTOK_PROVIDER_DRY_RUN
        value: "false"
      - key: ALLOW_LIVE_TIKTOK_PROVIDER_CALLS
        value: "true"
      - key: TIKTOK_PROVIDER_DAILY_RESULT_LIMIT
        value: "10000"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: BACKUP_RESTORE_TESTED_AT
        sync: false
